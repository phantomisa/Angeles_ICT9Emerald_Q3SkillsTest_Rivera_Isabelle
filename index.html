<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Log-In Page</title>

	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <link href="styles.css" rel="stylesheet">

	<style>
		body{
			display: flex;
			justify-content: center;
			align-items: center;
			font-family: arial;
			background-color: white;

			position: absolute;
			top: 70%;
			left: 50%;
			transform: translate(-50%,-50%);
		}

		#login-container{
			background-color: whitesmoke;
			border-radius: 20px;
			box-shadow: rgba(0, 0, 0, 0.31) 0px 2px 3px 0px;
			padding: 5%;
			width: 750px;
			justify-items: center;
			margin: 10%;
		}
		#confirm{
			padding: 10px;
      		margin-top: 10px;
      		background: #11a822;
      		color: white;
      		border: none;
      		border-radius: 5px;
      		cursor: pointer;
      		width: 100%;
		}
		#confirm:hover{
			background: #167d22;
		}
		button{
			padding: 10px;
      		margin-top: 10px;
      		border: none;
      		border-radius: 5px;
      		cursor: pointer;
      		font-size: 20px;
		}
		#create{
			background: #11a822;
			color: white;
			font-weight: bold;
		}
		#create:hover{
			background: #167d22;
		}
		#cancel{
			background: #e62020;
			color: white;
			font-weight: bold;
		}
		#cancel:hover{
			background: #8c0b0b;
		}

	</style>
</head>
<body>

	<div id="login-container">
		<h1 style="font-weight: bold;">REGISTRATION FORM</h1>
		<div id="form">
			<img src="blank-pfp.png" style="height: 100px; display: block; margin: 0 auto; border-radius: 20px;">
			<input type="file" id="fileInput" name="filename" class="form-control" style="margin-bottom: 5px; margin-top: 20px; width: 60%; justify-self: center;">
			<button type="button" id="uploadButton" class="form-control" style="width: 60%; justify-self: center; margin-bottom: 10px;" onclick="alert('Profile picture uploaded!')">Upload File</button>

			<form>
            
                <div class="container-fluid row" style="justify-self: center;" id="names" stt>
                    <div class="col-6 sm-4 my-2 p-2">
                        <label for="fname">First Name</label>
                        <input type="name" class="form-control" id="fname" placeholder="Enter your first name" name="fname">
                    </div>

                    <div class="col-6 sm-4 my-2 p-2">
                        <label for="lname">Last Name</label>
                        <input type="name" class="form-control" id="lname" placeholder="Enter your last name" name="lname">
                    </div>
                </div>

                <div class="container-fluid row"  id="agecontactnumber" style="justify-self: center;">
                    <div class="col-3 my-2 p-2"> 
                        <label for="age">Age</label>
                        <input type="number" class="form-control" id="age" name="age">
                    </div>

                    <div class="col-9 my-2 p-2">
                        <label for="contactnumber">Contact Number</label>
                        <input type="textarea" class="form-control" id="contactnumber" name="contactnumber" placeholder="+63 XX XXX XXXX">
                    </div>
                </div>

                <div class="container-fluid" style="justify-content: center; " id="userdetails">
                    <label for="email">Email</label>
                    <input type="email" class="form-control" id="email" placeholder="Enter your email" name="email" style="margin-bottom: 10px">
                    <label for="username">Username</label>
                    <input type="username" class="form-control" id="username" placeholder="Enter your username" name="username" style="margin-bottom: 10px">
                    <label for="password">Password</label>
                    <input type="password" class="form-control" id="password" placeholder="Enter your password" name="password" style="margin-bottom: 10px">
                </div>

                <div class="checkbox-row" style="justify-self: center;">
                    <input type="checkbox" id="terms" class="form-check-input">
                    <label for="terms">I accept the Terms of Use and Privacy Policy</label>
                </div>

                <br>


                <div class="button-row">
            		<button class="form-control" onclick="register()" style="margin-bottom: 10px;" id="create">Create Account</button>
            		<button class="form-control" type="reset" onclick="window.location.reload()" id="cancel">Cancel</button>
        		</div>

                <br>

            </form>
		</div>
	</div>

	<script>
		function register() {
            let email = document.getElementById("email").value;
            let contact = document.getElementById("contactnumber").value;
            let terms = document.getElementById("terms").checked;

            if (email == "" || contact == "") {
                alert("Complete all fields to register.");
                return;
            }

            if (!terms) {
                alert("Accept the Terms of Use and Privacy Policy to continue.");
                return;
            }

            alert("Account registered!");
        }

        document.getElementById("pfp").onchange = function(event) {
            let reader = new FileReader();
            reader.onload = function() {
                document.getElementById("preview").src = reader.result;
                document.getElementById("placeholder").style.display = "none";
            }
            if (event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }
	</script>

</body>
</html>
